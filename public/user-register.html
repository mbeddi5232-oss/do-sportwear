<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte - SPORTWEAR</title>
    <link href="https://fonts.googleapis.com/css2? family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --dark: #0f172a;
            --gray: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            max-width: 600px;
            width: 100%;
            padding: 3rem;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 2. 5rem;
            font-weight: 900;
            color: var(--dark);
            font-style: italic;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .logo-text span { color: var(--primary); }

        .subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 2. 5rem;
            font-size: 0.95rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .register-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, #e55a2b 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
        }

        .register-btn:disabled {
            opacity: 0. 6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1. 5rem;
            font-size: 0.9rem;
            display: none;
            border-left: 4px solid #c33;
        }

        .error-message.show {
            display: block;
        }

        .login-link {
            text-align: center;
            margin-top: 2rem;
            color: var(--gray);
            font-size: 0.9rem;
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="logo-text">SPORT<span>WEAR</span></div>
        <p class="subtitle">Créez votre compte pour profiter de tous nos avantages</p>

        <div class="error-message" id="errorMessage"></div>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">Prénom *</label>
                    <input type="text" id="firstName" required placeholder="Mohamed">
                </div>

                <div class="form-group">
                    <label for="lastName">Nom *</label>
                    <input type="text" id="lastName" required placeholder="Amine">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" required placeholder="mohamed@example.com">
            </div>

            <div class="form-group">
                <label for="phone">Téléphone</label>
                <input type="tel" id="phone" placeholder="+212 6XX-XXXXXX">
            </div>

            <div class="form-group">
                <label for="password">Mot de passe * (min 6 caractères)</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmer le mot de passe *</label>
                <input type="password" id="confirmPassword" required placeholder="••••••••">
            </div>

            <h3 style="margin: 2rem 0 1rem; color: var(--dark); font-size: 1.1rem;">Adresse de livraison</h3>

            <div class="form-group">
                <label for="street">Rue</label>
                <input type="text" id="street" placeholder="123 Rue Mohammed V">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="city">Ville</label>
                    <input type="text" id="city" placeholder="Casablanca">
                </div>

                <div class="form-group">
                    <label for="postalCode">Code postal</label>
                    <input type="text" id="postalCode" placeholder="20000">
                </div>
            </div>

            <button type="submit" class="register-btn" id="registerBtn">Créer mon compte</button>
        </form>

        <div class="login-link">
            Vous avez déjà un compte?  <a href="user-login.html">Se connecter</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const errorMsg = document.getElementById('errorMessage');
        const registerBtn = document. getElementById('registerBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate passwords match
            if (password !== confirmPassword) {
                showError('Les mots de passe ne correspondent pas');
                return;
            }

            // Validate password length
            if (password.length < 6) {
                showError('Le mot de passe doit contenir au moins 6 caractères');
                return;
            }

            const data = {
                firstName: document. getElementById('firstName').value. trim(),
                lastName: document. getElementById('lastName').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: password,
                phone: document.getElementById('phone').value.trim(),
                address: {
                    street: document.getElementById('street').value.trim(),
                    city: document.getElementById('city').value.trim(),
                    postalCode: document.getElementById('postalCode').value.trim(),
                    country: 'Maroc'
                }
            };

            errorMsg.classList.remove('show');
            registerBtn.disabled = true;
            registerBtn.textContent = 'Inscription en cours...';

            try {
                const response = await fetch('http://localhost:3000/api/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    alert('Compte créé avec succès! ');
                    window.location.href = 'user-profile.html';
                } else {
                    showError(result.error || 'Erreur lors de l\'inscription');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Créer mon compte';
                }

            } catch (error) {
                console.error('Error:', error);
                showError('Erreur de connexion au serveur');
                registerBtn. disabled = false;
                registerBtn.textContent = 'Créer mon compte';
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }
    </script>

</body>
</html>
