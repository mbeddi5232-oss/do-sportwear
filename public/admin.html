<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard - SportWear</title>
    <link href="https://fonts.googleapis.com/css2? family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ===========================
           CSS VARIABLES
        =========================== */
        :root {
            --primary: #FF6B35;
            --primary-hover: #ff5722;
            --dark: #0f172a;
            --dark-hover: #1e293b;
            --muted: #64748b;
            --light-bg: #f8fafc;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --card: #ffffff;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0. 1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --transition: 150ms ease;
        }

        /* ===========================
           RESET & BASE
        =========================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: 100%;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--light-bg);
            color: var(--dark);
            display: flex;
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===========================
           SIDEBAR
        =========================== */
        .sidebar {
            width: 260px;
            background: var(--dark);
            color: white;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-shrink: 0;
            transition: transform 250ms ease;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 100;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
            display: block;
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--primary);
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: 8px;
            transition: all var(--transition);
            position: relative;
        }

        .menu-item:hover,
        .menu-item:focus {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            outline: none;
            transform: translateX(2px);
        }

        .menu-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: 600;
        }

        .menu-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            background: var(--primary);
            border-radius: 0 2px 2px 0;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            flex-shrink: 0;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ===========================
           MAIN CONTENT
        =========================== */
        .main {
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1. 5rem;
            max-width: 100%;
            overflow-x: hidden;
        }

        /* ===========================
           TOPBAR
        =========================== */
        .topbar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .topbar-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hamburger {
            display: none;
            background: white;
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all var(--transition);
            color: var(--dark);
        }

        .hamburger:hover {
            background: var(--light-bg);
            border-color: var(--muted);
        }

        .hamburger:focus {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--dark);
            letter-spacing: -0.5px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===========================
           CONTROLS & SEARCH
        =========================== */
        .controls {
            display: flex;
            gap: 12px;
            align-items: stretch;
            flex-wrap: wrap;
        }

        .searchbar {
            display: flex;
            gap: 10px;
            align-items: center;
            background: white;
            padding: 10px 14px;
            border-radius: 10px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            flex: 1;
            min-width: 300px;
        }

        .search-input {
            border: 0;
            outline: none;
            flex: 1;
            font-size: 0.95rem;
            color: var(--dark);
            min-width: 0;
        }

        .search-input::placeholder {
            color: var(--muted);
        }

        .select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            color: var(--dark);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition);
            outline: none;
        }

        .select:hover {
            border-color: var(--muted);
        }

        .select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .add-btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            gap: 8px;
            align-items: center;
            transition: all var(--transition);
            white-space: nowrap;
        }

        .add-btn:hover {
            background: var(--primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        .add-btn:focus {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* ===========================
           CARD & TABLE
        =========================== */
        .card {
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: #fafbfc;
        }

        .card-title {
            font-weight: 700;
            color: var(--dark);
            font-size: 1rem;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            background: #f8fafb;
            padding: 14px 16px;
            text-align: left;
            font-weight: 700;
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            font-size: 0.95rem;
            color: var(--dark);
        }

        tbody tr {
            transition: background var(--transition);
        }

        tbody tr:hover {
            background: #fafbfc;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .thumb {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border);
            background: var(--light-bg);
        }

        .badge {
            background: #e0e7ff;
            color: #4338ca;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: capitalize;
            display: inline-block;
        }

        .badge.homme {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge.femme {
            background: #fce7f3;
            color: #9f1239;
        }

        .badge.accessoires {
            background: #d1fae5;
            color: #065f46;
        }

        .muted {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .price {
            color: var(--primary);
            font-weight: 700;
            font-size: 1rem;
        }

        /* ===========================
           ACTIONS & BUTTONS
        =========================== */
        .actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .icon-btn {
            background: white;
            border: 1px solid var(--border);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--muted);
            transition: all var(--transition);
        }

        .icon-btn:hover {
            background: var(--light-bg);
            color: var(--dark);
            transform: translateY(-1px);
        }

        .icon-btn:focus {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .icon-btn.delete-btn {
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .icon-btn.delete-btn:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        /* ===========================
           MODAL
        =========================== */
        .modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            padding: 20px;
            z-index: 1000;
            animation: fadeIn 200ms ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .form-card {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 580px;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0. 04);
            animation: slideUp 250ms ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark);
        }

        .close-btn {
            background: transparent;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }

        .close-btn:hover {
            background: var(--light-bg);
            color: var(--dark);
        }

        .form-row {
            display: flex;
            gap: 14px;
        }

        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .form-group label {
            font-weight: 600;
            color: var(--dark);
            font-size: 0.9rem;
        }

        .form-input {
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            outline: none;
            font-size: 0.95rem;
            transition: all var(--transition);
            font-family: inherit;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .form-input:disabled {
            background: var(--light-bg);
            cursor: not-allowed;
        }

        .img-preview-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: var(--light-bg);
            border-radius: 8px;
            border: 2px dashed var(--border);
        }

        .img-preview {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border);
            background: white;
        }

        .form-help {
            color: var(--muted);
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .cancel-btn {
            background: white;
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.95rem;
            transition: all var(--transition);
        }

        .cancel-btn:hover {
            background: var(--light-bg);
        }

        .save-btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            display: inline-flex;
            gap: 8px;
            align-items: center;
            transition: all var(--transition);
        }

        .save-btn:hover:not(:disabled) {
            background: var(--primary);
            transform: translateY(-1px);
        }

        .save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===========================
           TOAST NOTIFICATION
        =========================== */
        .toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            background: var(--dark);
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0. 05);
            display: none;
            z-index: 2000;
            min-width: 250px;
            animation: slideInRight 300ms ease;
        }

        .toast.show {
            display: block;
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ===========================
           EMPTY STATE
        =========================== */
        .empty-state {
            padding: 48px 20px;
            text-align: center;
            color: var(--muted);
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            opacity: 0.4;
        }

        /* ===========================
           RESPONSIVE
        =========================== */
        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 1000;
                box-shadow: var(--shadow-lg);
            }

            .hamburger {
                display: inline-flex;
            }

            .topbar {
                gap: 1rem;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .searchbar {
                min-width: 100%;
            }

            .add-btn {
                justify-content: center;
            }
        }

        @media (max-width: 640px) {
            .main {
                padding: 1rem;
            }

            .title {
                font-size: 1.4rem;
            }

            .form-row {
                flex-direction: column;
            }

            .form-card {
                padding: 20px;
            }

            table {
                min-width: 640px;
            }
        }

        /* ===========================
           ACCESSIBILITY
        =========================== */
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        *:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* ===========================
           LOADING STATE
        =========================== */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .loading-overlay.active {
            display: flex;
        }
    </style>
</head>
<body>
    <!-- ===========================
         SIDEBAR
    =========================== -->
    <aside class="sidebar" id="sidebar" aria-label="Navigation principale">
        <a href="index.html" class="logo" tabindex="0">
            SPORT<span>WEAR</span>
        </a>

        <nav aria-label="Menu principal">
            <a href="#" class="menu-item active" aria-current="page">
                <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
                Produits
            </a>

            <a href="#" class="menu-item">
                <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                </svg>
                Commandes
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="index.html" class="menu-item">
                <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Retour au site
            </a>
        </div>
    </aside>

    <!-- ===========================
         MAIN CONTENT
    =========================== -->
    <main class="main" id="main">
        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-title">
                <button class="hamburger" id="sidebarToggle" aria-label="Afficher/Masquer le menu" aria-expanded="false">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2. 5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <h1 class="title">Produits</h1>
                <span id="loader" class="spinner" style="display:none;" aria-hidden="true" aria-live="polite"></span>
            </div>

            <section class="controls">
                <form class="searchbar" role="search" aria-label="Recherche produit" id="searchForm" onsubmit="return false;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input 
                        class="search-input" 
                        id="searchInput" 
                        type="search" 
                        placeholder="Rechercher un produit..." 
                        aria-label="Rechercher un produit"
                        autocomplete="off"
                    >
                    <select id="categoryFilter" class="select" aria-label="Filtrer par catégorie">
                        <option value="">Toutes catégories</option>
                        <option value="homme">Homme</option>
                        <option value="femme">Femme</option>
                        <option value="accessoires">Accessoires</option>
                    </select>
                </form>

                <button class="add-btn" id="addBtn" aria-label="Ajouter un nouveau produit">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2. 5" aria-hidden="true">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Ajouter
                </button>
            </section>
        </header>

        <!-- PRODUCTS TABLE -->
        <section class="card" aria-labelledby="tableTitle">
            <div class="card-header">
                <h2 class="card-title" id="tableTitle">Liste des produits</h2>
                <button id="refreshBtn" class="icon-btn" title="Rafraîchir la liste" aria-label="Rafraîchir la liste">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21. 5 2v6h-6M2. 5 22v-6h6M2 11.5a10 10 0 0118. 8-4.3M22 12. 5a10 10 0 01-18.8 4.2"/>
                    </svg>
                </button>
            </div>

            <div class="table-wrapper">
                <table aria-live="polite" aria-busy="false" id="productTable">
                    <thead>
                        <tr>
                            <th style="width: 64px;">Image</th>
                            <th>Produit</th>
                            <th>Catégorie</th>
                            <th>Marque</th>
                            <th>Prix</th>
                            <th style="text-align: right; width: 140px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <tr>
                            <td colspan="6" class="empty-state">
                                <div class="spinner"></div>
                                <p style="margin-top: 12px;">Chargement des produits... </p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- ===========================
         MODAL - ADD/EDIT PRODUCT
    =========================== -->
    <div class="modal" id="addModal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="modalTitle">
        <div class="form-card" role="document">
            <div class="modal-header">
                <h2 id="modalTitle" class="modal-title">Nouveau produit</h2>
                <button type="button" class="close-btn" id="closeModalBtn" aria-label="Fermer">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <form id="addForm" novalidate>
                <input type="hidden" name="id" id="productId" />

                <div class="form-group">
                    <label for="name">Nom du produit <span style="color: var(--danger);">*</span></label>
                    <input 
                        class="form-input" 
                        id="name" 
                        name="name" 
                        type="text"
                        required 
                        placeholder="Ex: T-shirt Nike Air"
                        autocomplete="off"
                    />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Prix (DH) <span style="color: var(--danger);">*</span></label>
                        <input 
                            class="form-input" 
                            id="price" 
                            name="price" 
                            type="number" 
                            min="0" 
                            step="0.01"
                            required 
                            placeholder="299"
                        />
                    </div>

                    <div class="form-group">
                        <label for="category">Catégorie</label>
                        <select class="form-input" id="category" name="category" aria-label="Catégorie">
                            <option value="homme">Homme</option>
                            <option value="femme">Femme</option>
                            <option value="accessoires">Accessoires</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="brand">Marque</label>
                    <input 
                        class="form-input" 
                        id="brand" 
                        name="brand" 
                        type="text"
                        placeholder="Ex: Nike"
                        autocomplete="off"
                    />
                </div>

                <div class="form-group">
                    <label for="img">Image (Nom du fichier ou URL)</label>
                    <input 
                        class="form-input" 
                        id="img" 
                        name="img" 
                        type="text"
                        placeholder="Ex: product-1.jpg ou https://..."
                        aria-describedby="imgHelp"
                        autocomplete="off"
                    />
                    <small id="imgHelp" class="form-help">
                        Le fichier doit être dans le dossier 'public' ou être une URL complète. 
                    </small>
                </div>

                <div class="form-group">
                    <label>Aperçu de l'image</label>
                    <div class="img-preview-container">
                        <img 
                            id="imgPreview" 
                            class="img-preview" 
                            alt="Aperçu de l'image produit" 
                            src="https://via.placeholder.com/80? text=Aperçu"
                        />
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="cancel-btn" id="cancelBtn">Annuler</button>
                    <button type="submit" class="save-btn" id="saveBtn">
                        <span id="saveBtnText">Enregistrer</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ===========================
         TOAST NOTIFICATION
    =========================== -->
    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <!-- ===========================
         JAVASCRIPT
    =========================== -->
    <script>
        (() => {
            'use strict';
             (async function checkAuthentication() {
                try {
                    const response = await fetch('http://localhost:3000/api/admin/check', {
                        method: 'GET',
                        credentials: 'include'
                    });
                    
                    const data = await response.json();
                    
                    if (! data.loggedIn) {
                        // Not logged in - redirect to login
                        window. location.href = 'admin-login.html';
                        return;
                    }
                    
                    // Logged in - display admin info
                    console.log('✅ Authenticated as:', data.admin.name, `(${data.admin.role})`);
                    
                    // Optional: Show admin name in sidebar
                    const sidebarFooter = document.querySelector('.sidebar-footer');
                    if (sidebarFooter) {
                        const adminInfo = document.createElement('div');
                        adminInfo.style.cssText = 'padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 12px; color: #94a3b8; font-size: 0.85rem;';
                        adminInfo.innerHTML = `
                            <div style="font-weight: 600; color: white; margin-bottom: 4px;">${data.admin.name}</div>
                            <div style="font-size: 0.8rem;">${data.admin.email}</div>
                        `;
                        sidebarFooter.insertBefore(adminInfo, sidebarFooter.firstChild);
                        
                        // Add logout button
                        const logoutBtn = document.createElement('a');
                        logoutBtn. href = '#';
                        logoutBtn. className = 'menu-item';
                        logoutBtn.style.cssText = 'margin-top: 8px; color: #ef4444;';
                        logoutBtn. innerHTML = `
                            <svg class="nav-icon" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                            </svg>
                            Déconnexion
                        `;
                        logoutBtn. addEventListener('click', async (e) => {
                            e.preventDefault();
                            if (confirm('Voulez-vous vraiment vous déconnecter ? ')) {
                                try {
                                    await fetch('http://localhost:3000/api/admin/logout', {
                                        method: 'POST',
                                        credentials: 'include'
                                    });
                                    window.location.href = 'admin-login.html';
                                } catch (error) {
                                    console.error('Logout error:', error);
                                    alert('Erreur lors de la déconnexion');
                                }
                            }
                        });
                        sidebarFooter.appendChild(logoutBtn);
                    }
                    
                } catch (error) {
                    console.error('Auth check failed:', error);
                    // On error, redirect to login
                    window.location.href = 'admin-login.html';
                }
            })();
            

            // ===========================
            // CONSTANTS & STATE
            // ===========================
            const API_BASE = '/api/products';
            const TOAST_DURATION = 3000;
            const SEARCH_DEBOUNCE = 300;

            let products = [];
            let filteredProducts = [];
            let isLoading = false;
            let previouslyFocusedElement = null;
            let searchDebounceTimer = null;

            // ===========================
            // DOM CACHE
            // ===========================
            const DOM = {
                // Sidebar
                sidebar: document.getElementById('sidebar'),
                sidebarToggle: document.getElementById('sidebarToggle'),

                // Main controls
                addBtn: document.getElementById('addBtn'),
                refreshBtn: document.getElementById('refreshBtn'),
                searchInput: document. getElementById('searchInput'),
                categoryFilter: document.getElementById('categoryFilter'),

                // Table
                adminTableBody: document.getElementById('adminTableBody'),
                productTable: document.getElementById('productTable'),

                // Modal
                addModal: document.getElementById('addModal'),
                addForm: document.getElementById('addForm'),
                modalTitle: document.getElementById('modalTitle'),
                closeModalBtn: document.getElementById('closeModalBtn'),
                cancelBtn: document.getElementById('cancelBtn'),
                saveBtn: document. getElementById('saveBtn'),
                saveBtnText: document.getElementById('saveBtnText'),

                // Form inputs
                productId: document.getElementById('productId'),
                nameInput: document.getElementById('name'),
                priceInput: document. getElementById('price'),
                categoryInput: document.getElementById('category'),
                brandInput: document.getElementById('brand'),
                imgInput: document.getElementById('img'),
                imgPreview: document.getElementById('imgPreview'),

                // Feedback
                loader: document.getElementById('loader'),
                toast: document.getElementById('toast'),
            };

            // ===========================
            // UTILITY FUNCTIONS
            // ===========================

            /**
             * Show/hide loading spinner
             */
            function setLoading(show = true) {
                isLoading = show;
                DOM.loader.style.display = show ? 'inline-block' : 'none';
                DOM.productTable.setAttribute('aria-busy', String(show));
            }

            /**
             * Show toast notification
             */
            function showToast(message, type = 'info') {
                DOM.toast.textContent = message;
                DOM.toast.className = `toast show ${type}`;
                
                setTimeout(() => {
                    DOM.toast.classList.remove('show');
                }, TOAST_DURATION);
            }

            /**
             * Escape HTML to prevent XSS
             */
            function escapeHtml(str) {
                if (str == null) return '';
                const div = document.createElement('div');
                div.textContent = String(str);
                return div. innerHTML;
            }

            /**
             * Get proper image source
             */
            function getImageSrc(value) {
                if (! value) return 'https://via.placeholder.com/48?text=No+Image';
                
                // If it's already a full URL
                if (value.startsWith('http://') || value.startsWith('https://') || value.startsWith('//')) {
                    return value;
                }
                
                // Otherwise, assume it's in the public folder
                return `/public/${value}`. replace(/\/+/g, '/');
            }

            /**
             * Format price
             */
            function formatPrice(price) {
                return typeof price === 'number' ? price.toFixed(2) : parseFloat(price || 0).toFixed(2);
            }

            /**
             * Get category badge class
             */
            function getCategoryClass(category) {
                const cat = String(category).toLowerCase();
                return `badge ${cat}`;
            }

            // ===========================
            // API FUNCTIONS
            // ===========================

            /**
             * Fetch all products from API
             */
            async function fetchProducts() {
                setLoading(true);
                
                try {
                    const response = await fetch(API_BASE);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response. status}`);
                    }
                    
                    const data = await response.json();
                    products = Array.isArray(data) ? data : [];
                    filteredProducts = [... products];
                    
                    renderTable(filteredProducts);
                    showToast(`${products.length} produit(s) chargé(s)`, 'success');
                    
                } catch (error) {
                    console.error('Error fetching products:', error);
                    showToast('Erreur lors du chargement des produits', 'error');
                    renderEmptyState('Erreur de chargement.  Cliquez sur Rafraîchir.');
                } finally {
                    setLoading(false);
                }
            }

            /**
             * Create or update a product
             */
            async function saveProduct(productData) {
                const id = DOM.productId.value;
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${API_BASE}/${encodeURIComponent(id)}` : API_BASE;

                DOM.saveBtn.disabled = true;
                DOM.saveBtnText.innerHTML = '<span class="spinner" style="border-top-color:white;width:16px;height:16px;border-width:2px;"></span>';

                try {
                    const response = await fetch(url, {
                        method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(productData)
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(errorText || 'Erreur lors de l\'enregistrement');
                    }

                    await fetchProducts();
                    closeModal();
                    showToast(id ? 'Produit mis à jour avec succès' : 'Produit ajouté avec succès', 'success');

                } catch (error) {
                    console.error('Error saving product:', error);
                    showToast(error.message || 'Erreur lors de l\'enregistrement', 'error');
                } finally {
                    DOM.saveBtn.disabled = false;
                    DOM.saveBtnText. textContent = 'Enregistrer';
                }
            }

            /**
             * Delete a product
             */
            async function deleteProduct(id) {
                if (! confirm('Êtes-vous sûr de vouloir supprimer ce produit ?  Cette action est irréversible.')) {
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE}/${encodeURIComponent(id)}`, {
                        method: 'DELETE'
                    });

                    if (!response.ok) {
                        throw new Error('Erreur lors de la suppression');
                    }

                    await fetchProducts();
                    showToast('Produit supprimé avec succès', 'success');

                } catch (error) {
                    console.error('Error deleting product:', error);
                    showToast('Impossible de supprimer le produit', 'error');
                }
            }

            // ===========================
            // RENDERING FUNCTIONS
            // ===========================

            /**
             * Render products table
             */
            function renderTable(productList) {
                if (! productList || productList.length === 0) {
                    renderEmptyState('Aucun produit trouvé.');
                    return;
                }

                const html = productList.map(product => {
                    const id = product.id ??  product._id ??  '';
                    const imgSrc = getImageSrc(product.img);
                    const price = formatPrice(product.price);

                    return `
                        <tr data-id="${escapeHtml(id)}">
                            <td>
                                <img 
                                    src="${escapeHtml(imgSrc)}" 
                                    class="thumb" 
                                    alt="Image de ${escapeHtml(product. name)}" 
                                    onerror="this.src='https://via.placeholder.com/48?text=Error'"
                                />
                            </td>
                            <td style="font-weight: 600;">${escapeHtml(product. name)}</td>
                            <td>
                                <span class="${getCategoryClass(product.category)}">
                                    ${escapeHtml(product.category || '-')}
                                </span>
                            </td>
                            <td class="muted">${escapeHtml(product.brand || '-')}</td>
                            <td class="price">${escapeHtml(price)} DH</td>
                            <td>
                                <div class="actions">
                                    <button 
                                        class="icon-btn" 
                                        title="Modifier ${escapeHtml(product.name)}" 
                                        aria-label="Modifier ${escapeHtml(product.name)}"
                                        onclick="window.editProduct('${escapeHtml(id)}')"
                                    >
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"></path>
                                            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                        </svg>
                                    </button>
                                    <button 
                                        class="icon-btn delete-btn" 
                                        title="Supprimer ${escapeHtml(product.name)}" 
                                        aria-label="Supprimer ${escapeHtml(product.name)}"
                                        onclick="window.confirmDeleteProduct('${escapeHtml(id)}')"
                                    >
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <polyline points="3 6 5 6 21 6"></polyline>
                                            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
                                            <line x1="10" y1="11" x2="10" y2="17"></line>
                                            <line x1="14" y1="11" x2="14" y2="17"></line>
                                        </svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');

                DOM.adminTableBody.innerHTML = html;
            }

            /**
             * Render empty state
             */
            function renderEmptyState(message) {
                DOM.adminTableBody.innerHTML = `
                    <tr>
                        <td colspan="6" class="empty-state">
                            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="12"></line>
                                <line x1="12" y1="16" x2="12. 01" y2="16"></line>
                            </svg>
                            <p>${escapeHtml(message)}</p>
                        </td>
                    </tr>
                `;
            }

            // ===========================
            // FILTER & SEARCH
            // ===========================

            /**
             * Apply search and category filters
             */
            function applyFilters() {
                const searchQuery = DOM.searchInput.value. trim(). toLowerCase();
                const selectedCategory = DOM.categoryFilter.value;

                filteredProducts = products.filter(product => {
                    // Search filter
                    const matchesSearch = ! searchQuery || 
                        (product.name && product.name.toLowerCase().includes(searchQuery)) ||
                        (product.brand && product.brand.toLowerCase().includes(searchQuery));

                    // Category filter
                    const matchesCategory = ! selectedCategory || 
                        (product.category && product.category === selectedCategory);

                    return matchesSearch && matchesCategory;
                });

                renderTable(filteredProducts);
            }

            /**
             * Debounced search handler
             */
            function handleSearch() {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(applyFilters, SEARCH_DEBOUNCE);
            }

            // ===========================
            // MODAL FUNCTIONS
            // ===========================

            /**
             * Open modal for creating/editing product
             */
            function openModal(mode = 'create', product = null) {
                previouslyFocusedElement = document.activeElement;

                if (mode === 'edit' && product) {
                    DOM.modalTitle.textContent = 'Modifier le produit';
                    DOM.productId.value = product.id ??  product._id ??  '';
                    DOM.nameInput.value = product.name ??  '';
                    DOM.priceInput.value = product.price ??  '';
                    DOM.categoryInput.value = product.category ?? 'homme';
                    DOM.brandInput.value = product.brand ?? '';
                    DOM.imgInput. value = product.img ?? '';
                    updateImagePreview();
                } else {
                    DOM.modalTitle.textContent = 'Nouveau produit';
                    DOM. addForm.reset();
                    DOM.productId.value = '';
                    DOM.imgPreview.src = 'https://via.placeholder.com/80?text=Aperçu';
                }

                DOM.addModal.classList.add('active');
                DOM.addModal.setAttribute('aria-hidden', 'false');
                
                // Focus first input
                setTimeout(() => DOM.nameInput.focus(), 100);
                
                // Trap focus in modal
                setupFocusTrap();
            }

            /**
             * Close modal
             */
            function closeModal() {
                DOM.addModal.classList.remove('active');
                DOM.addModal.setAttribute('aria-hidden', 'true');
                
                // Return focus to previously focused element
                if (previouslyFocusedElement) {
                    previouslyFocusedElement.focus();
                }
                
                removeFocusTrap();
            }

            /**
             * Update image preview
             */
            function updateImagePreview() {
                const imgValue = DOM.imgInput.value. trim();
                DOM.imgPreview.src = imgValue ? getImageSrc(imgValue) : 'https://via.placeholder.com/80?text=Aperçu';
            }

            // ===========================
            // FOCUS TRAP (Accessibility)
            // ===========================
            let focusableElements = [];
            let firstFocusable = null;
            let lastFocusable = null;

            function setupFocusTrap() {
                focusableElements = Array.from(
                    DOM.addModal.querySelectorAll(
                        'a[href], button:not([disabled]), textarea, input, select, [tabindex]:not([tabindex="-1"])'
                    )
                ). filter(el => el.offsetParent !== null);

                if (focusableElements.length > 0) {
                    firstFocusable = focusableElements[0];
                    lastFocusable = focusableElements[focusableElements.length - 1];
                    DOM.addModal.addEventListener('keydown', handleFocusTrap);
                }
            }

            function removeFocusTrap() {
                DOM.addModal.removeEventListener('keydown', handleFocusTrap);
            }

            function handleFocusTrap(e) {
                if (e.key === 'Tab') {
                    if (e.shiftKey && document.activeElement === firstFocusable) {
                        e.preventDefault();
                        lastFocusable.focus();
                    } else if (!e.shiftKey && document.activeElement === lastFocusable) {
                        e.preventDefault();
                        firstFocusable.focus();
                    }
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    closeModal();
                }
            }

            // ===========================
            // FORM VALIDATION & SUBMISSION
            // ===========================

            /**
             * Validate form data
             */
            function validateForm(data) {
                const errors = [];

                if (!data.name || data.name.trim(). length === 0) {
                    errors.push('Le nom du produit est requis');
                }

                if (data.price === null || data.price === undefined || data.price <= 0) {
                    errors.push('Le prix doit être supérieur à 0');
                }

                return errors;
            }

            /**
             * Handle form submission
             */
            function handleFormSubmit(e) {
                e.preventDefault();

                const formData = {
                    name: DOM.nameInput.value.trim(),
                    price: parseFloat(DOM. priceInput.value) || 0,
                    category: DOM.categoryInput.value,
                    brand: DOM.brandInput.value.trim(),
                    img: DOM.imgInput. value.trim()
                };

                // Validate
                const errors = validateForm(formData);
                if (errors.length > 0) {
                    showToast(errors.join('.  '), 'error');
                    return;
                }

                // Save
                saveProduct(formData);
            }

            // ===========================
            // GLOBAL FUNCTIONS (for onclick handlers)
            // ===========================

            window.editProduct = function(id) {
                const product = products. find(p => String(p.id ??  p._id ??  '') === String(id));
                
                if (!product) {
                    showToast('Produit introuvable', 'error');
                    return;
                }
                
                openModal('edit', product);
            };

            window.confirmDeleteProduct = function(id) {
                deleteProduct(id);
            };

            // ===========================
            // EVENT LISTENERS
            // ===========================

            function initEventListeners() {
                // Sidebar toggle
                DOM.sidebarToggle.addEventListener('click', () => {
                    const isHidden = DOM.sidebar.classList.toggle('hidden');
                    DOM.sidebarToggle.setAttribute('aria-expanded', String(! isHidden));
                });

                // Add button
                DOM.addBtn.addEventListener('click', () => openModal('create'));

                // Refresh button
                DOM.refreshBtn. addEventListener('click', () => {
                    fetchProducts();
                });

                // Search input
                DOM.searchInput.addEventListener('input', handleSearch);

                // Category filter
                DOM.categoryFilter.addEventListener('change', applyFilters);

                // Image input
                DOM.imgInput.addEventListener('input', updateImagePreview);

                // Form submission
                DOM.addForm. addEventListener('submit', handleFormSubmit);

                // Modal close buttons
                DOM.closeModalBtn.addEventListener('click', closeModal);
                DOM.cancelBtn.addEventListener('click', closeModal);

                // Close modal on backdrop click
                DOM.addModal.addEventListener('click', (e) => {
                    if (e.target === DOM.addModal) {
                        closeModal();
                    }
                });

                // Close modal on Escape key
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && DOM.addModal.classList.contains('active')) {
                        closeModal();
                    }
                });
            }

            // ===========================
            // INITIALIZATION
            // ===========================

            function init() {
                initEventListeners();
                fetchProducts();

                // Hide sidebar on mobile initially
                if (window.innerWidth <= 900) {
                    DOM.sidebar.classList.add('hidden');
                    DOM.sidebarToggle. setAttribute('aria-expanded', 'false');
                }
            }

            // Start the app when DOM is ready
            if (document.readyState === 'loading') {
                document. addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
</body>
</html>
