<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commande Confirmée - SportWear</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --dark: #0f172a;
            --success: #10b981;
            --gray: #64748b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 3.5rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 480px;
            width: 90%;
            animation: slideUp 0.6s ease-out;
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background-color: rgba(16, 185, 129, 0.1); /* Vert très clair */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
        }
        .icon-svg {
            width: 40px;
            height: 40px;
            color: var(--success);
            stroke-width: 2.5;
        }
        h1 {
            font-family: 'Montserrat', sans-serif;
            color: var(--dark);
            font-size: 1.8rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        p {
            color: var(--gray);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }
        .btn {
            display: inline-block;
            background-color: var(--dark);
            color: white;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(15, 23, 42, 0.15);
        }
        .btn:hover {
            background-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(255, 107, 53, 0.3);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-circle">
            <svg class="icon-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
        </div>
        
        <h1>Merci pour votre commande</h1>
        <p>Votre paiement a été validé avec succès. Un email de confirmation contenant les détails de votre commande vous a été envoyé.</p>
        
        <a href="index.html" class="btn">Retour à la boutique</a>
    </div>

    <script>
        // Nettoyage automatique du panier après paiement réussi
        localStorage.removeItem('shopCart');
    </script>
</body>
</html>
